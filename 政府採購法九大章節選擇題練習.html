<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政府採購法九大章節選擇題練習</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans TC',Arial,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
  header{background:linear-gradient(135deg,#1a365d,#2c5282);color:white;padding:18px 24px}
  header h1{font-size:1.35rem;font-weight:700}
  header p{font-size:0.83rem;opacity:.82;margin-top:4px}
  .tab-bar{background:white;border-bottom:2px solid #e2e8f0;display:flex}
  .tab-btn{flex:1;padding:13px 6px;border:none;background:none;font-size:.9rem;font-weight:600;color:#718096;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
  .tab-btn:hover{color:#2b6cb0;background:#f7fafc}
  .tab-btn.active{color:#2b6cb0;border-bottom-color:#2b6cb0}
  .tab-btn .badge{display:inline-block;background:#e53e3e;color:white;font-size:.7rem;padding:1px 6px;border-radius:10px;margin-left:4px;vertical-align:middle}
  .panel{display:none}.panel.active{display:block}
  .toolbar{background:white;padding:11px 20px;border-bottom:1px solid #e2e8f0;display:flex;flex-wrap:wrap;gap:9px;align-items:center}
  .toolbar select,.toolbar button{padding:7px 13px;border-radius:8px;border:1px solid #cbd5e0;font-size:.88rem;cursor:pointer}
  .toolbar select{background:white;max-width:300px}
  .toolbar button{background:#2b6cb0;color:white;border-color:#2b6cb0;font-weight:600}
  .toolbar button:hover{background:#2c5282}
  .toolbar button.sec{background:white;color:#4a5568;border-color:#cbd5e0}
  .toolbar button.sec:hover{background:#edf2f7}
  .progress-bar{height:4px;background:#e2e8f0}
  .progress-fill{height:100%;background:#2b6cb0;transition:width .3s}
  .stats-bar{background:white;padding:9px 20px;display:flex;gap:18px;font-size:.83rem;color:#4a5568;border-bottom:1px solid #e2e8f0;flex-wrap:wrap}
  .stats-bar span strong{color:#1a202c}
  .ok{color:#38a169}.ng{color:#e53e3e}
  .main{max-width:860px;margin:0 auto;padding:22px 16px}
  .qcard{background:white;border-radius:12px;padding:26px;box-shadow:0 1px 6px rgba(0,0,0,.08);margin-bottom:16px}
  .qmeta{font-size:.76rem;color:#718096;margin-bottom:9px;display:flex;gap:9px;flex-wrap:wrap;align-items:center}
  .sbadge{padding:2px 9px;border-radius:20px;font-weight:700;font-size:.75rem}
  .qnum{color:#a0aec0}
  .stem{font-size:1.03rem;line-height:1.78;margin-bottom:18px;font-weight:500}
  .options{display:flex;flex-direction:column;gap:9px}
  .obtn{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;background:white;text-align:left;font-size:.93rem;line-height:1.5;transition:all .15s;width:100%}
  .obtn:hover:not(:disabled){border-color:#90cdf4;background:#ebf8ff}
  .obtn .lbl{min-width:27px;height:27px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;flex-shrink:0}
  .obtn .txt{flex:1}
  .obtn.correct{border-color:#38a169;background:#f0fff4}.obtn.correct .lbl{background:#38a169;color:white}
  .obtn.wrong{border-color:#e53e3e;background:#fff5f5}.obtn.wrong .lbl{background:#e53e3e;color:white}
  .obtn.show-correct{border-color:#38a169;background:#f0fff4}.obtn.show-correct .lbl{background:#38a169;color:white}
  .obtn:disabled{cursor:default}
  .feedback{margin-top:14px;padding:13px 15px;border-radius:10px;font-size:.93rem;line-height:1.55}
  .feedback.ok{background:#f0fff4;border:1px solid #9ae6b4;color:#276749}
  .feedback.ng{background:#fff5f5;border:1px solid #feb2b2;color:#822727}
  .nav-row{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
  .nbtn{padding:10px 22px;border-radius:8px;border:none;cursor:pointer;font-size:.93rem;font-weight:600;background:#2b6cb0;color:white}
  .nbtn:hover{background:#2c5282}
  .result-card{background:white;border-radius:12px;padding:36px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.08)}
  .result-card h2{font-size:1.7rem;margin-bottom:6px}
  .result-card .score{font-size:3.4rem;font-weight:800;color:#2b6cb0;margin:14px 0}
  .result-card p{color:#4a5568;margin-bottom:5px}
  .result-actions{margin-top:22px;display:flex;gap:11px;justify-content:center;flex-wrap:wrap}
  .result-actions button{padding:11px 20px;border:none;border-radius:10px;font-size:.93rem;font-weight:700;cursor:pointer}
  .btn-restart{background:#2b6cb0;color:white}.btn-restart:hover{background:#2c5282}
  .btn-wq{background:#dd6b20;color:white}.btn-wq:hover{background:#c05621}
  .btn-vw{background:#e53e3e;color:white}.btn-vw:hover{background:#c53030}
  .wtoolbar{background:white;padding:11px 20px;border-bottom:1px solid #e2e8f0;display:flex;flex-wrap:wrap;gap:9px;align-items:center}
  .wtoolbar select{padding:7px 13px;border-radius:8px;border:1px solid #cbd5e0;font-size:.88rem;background:white;cursor:pointer}
  .wtoolbar button{padding:7px 13px;border-radius:8px;border:none;font-size:.88rem;cursor:pointer;font-weight:600}
  .btn-wp{background:#2b6cb0;color:white}.btn-wp:hover{background:#2c5282}
  .btn-wc{background:#e53e3e;color:white}.btn-wc:hover{background:#c53030}
  .wstats{background:white;padding:9px 20px;border-bottom:1px solid #e2e8f0;font-size:.83rem;color:#4a5568;display:flex;gap:16px;flex-wrap:wrap}
  .wlist{max-width:860px;margin:0 auto;padding:22px 16px}
  .wempty{text-align:center;color:#718096;padding:70px 20px}
  .wempty .icon{font-size:2.8rem;margin-bottom:12px}
  .witem{background:white;border-radius:12px;padding:20px 22px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:13px;border-left:4px solid #e53e3e}
  .witem-meta{font-size:.76rem;color:#718096;margin-bottom:8px;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  .wtimes{background:#fff5f5;color:#e53e3e;padding:2px 8px;border-radius:20px;font-weight:700}
  .wstem{font-size:.95rem;font-weight:500;line-height:1.7;margin-bottom:11px}
  .wopts{display:flex;flex-direction:column;gap:6px}
  .wopt{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border-radius:8px;font-size:.88rem;line-height:1.5;border:1.5px solid #e2e8f0}
  .wopt.isc{border-color:#38a169;background:#f0fff4}
  .wopt .wlbl{min-width:23px;height:23px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;flex-shrink:0}
  .wopt.isc .wlbl{background:#38a169;color:white}
  .witem-actions{margin-top:11px}
  .btn-rm{padding:5px 12px;border-radius:6px;border:1px solid #fc8181;color:#e53e3e;background:white;font-size:.8rem;cursor:pointer}
  .btn-rm:hover{background:#fff5f5}
  @media(max-width:600px){
    .toolbar,.wtoolbar{padding:9px 11px}
    .main,.wlist{padding:14px 9px}
    .qcard,.witem{padding:16px 13px}
    .stem,.wstem{font-size:.96rem}
    .toolbar select{max-width:100%}
  }
</style>
</head>
<body>

<header>
  <h1>📋 政府採購法九大章節選擇題練習</h1>
  <p>共 446 題・各章節混合・選項隨機排列</p>
</header>

<div class="tab-bar">
  <button class="tab-btn active" id="tabQuiz" onclick="switchTab('quiz')">📝 練習作答</button>
  <button class="tab-btn" id="tabWrong" onclick="switchTab('wrong')">❌ 錯題整理 <span class="badge" id="wBadge" style="display:none">0</span></button>
</div>

<div class="panel active" id="quizPanel">
  <div class="toolbar">
    <select id="secFilter">
      <option value="all">全部九大章節（共 446 題）</option>
      <option value="工程及技術服務採購作業">工程及技術服務採購作業（71題）</option>
<option value="財物及勞務採購作業">財物及勞務採購作業（142題）</option>
<option value="政府採購全生命週期概論">政府採購全生命週期概論（24題）</option>
<option value="政府採購法之履約管理及驗收">政府採購法之履約管理及驗收（14題）</option>
<option value="政府採購法之爭議處理">政府採購法之爭議處理（45題）</option>
<option value="底價及價格分析">底價及價格分析（44題）</option>
<option value="投標須知及招標文件製作">投標須知及招標文件製作（35題）</option>
<option value="道德規範及違法處置">道德規範及違法處置（21題）</option>
<option value="政府採購法之罰則及附則">政府採購法之罰則及附則（50題）</option>
    </select>
    <button onclick="startQuiz()">🔀 重新隨機開始</button>
    <button class="sec" id="btnWP" style="display:none" onclick="startWrongQuiz()">🔁 只練錯題</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
  <div class="stats-bar">
    <span>題目 <strong id="qIdx">-</strong> / <strong id="qTot">-</strong></span>
    <span class="ok">✓ 答對 <strong id="okCnt">0</strong></span>
    <span class="ng">✗ 答錯 <strong id="ngCnt">0</strong></span>
    <span>正確率 <strong id="acc">-</strong></span>
  </div>
  <div class="main" id="mainArea"></div>
</div>

<div class="panel" id="wrongPanel">
  <div class="wtoolbar">
    <select id="wFilter" onchange="renderWrong()">
      <option value="all">全部章節</option>
      <option value="工程及技術服務採購作業">工程及技術服務採購作業</option>
<option value="財物及勞務採購作業">財物及勞務採購作業</option>
<option value="政府採購全生命週期概論">政府採購全生命週期概論</option>
<option value="政府採購法之履約管理及驗收">政府採購法之履約管理及驗收</option>
<option value="政府採購法之爭議處理">政府採購法之爭議處理</option>
<option value="底價及價格分析">底價及價格分析</option>
<option value="投標須知及招標文件製作">投標須知及招標文件製作</option>
<option value="道德規範及違法處置">道德規範及違法處置</option>
<option value="政府採購法之罰則及附則">政府採購法之罰則及附則</option>
    </select>
    <button class="btn-wp" onclick="startWrongQuiz()">🔁 練習全部錯題</button>
    <button class="btn-wc" onclick="clearWrong()">🗑️ 清空錯題</button>
  </div>
  <div class="wstats" id="wStats"></div>
  <div class="wlist" id="wListArea"></div>
</div>

const SEC_META={"工程及技術服務採購作業": {"color": "#2b6cb0", "bg": "#ebf8ff"}, "財物及勞務採購作業": {"color": "#276749", "bg": "#f0fff4"}, "政府採購全生命週期概論": {"color": "#744210", "bg": "#fffff0"}, "政府採購法之履約管理及驗收": {"color": "#553c9a", "bg": "#faf5ff"}, "政府採購法之爭議處理": {"color": "#086f83", "bg": "#e6fffa"}, "底價及價格分析": {"color": "#285e61", "bg": "#e6fffa"}, "道德規範及違法處置": {"color": "#b7791f", "bg": "#fffaf0"}, "政府採購法之罰則及附則": {"color": "#c53030", "bg": "#fff5f5"}, "投標須知及招標文件製作": {"color": "#6b46c1", "bg": "#faf5ff"}};

let wrongMap={};
function addWrong(q){const k=q.stem;wrongMap[k]?wrongMap[k].count++:(wrongMap[k]={q,count:1});refreshBadge()}
function removeWrong(stem){delete wrongMap[stem];refreshBadge();renderWrong()}
function clearWrong(){if(!confirm('確定清空全部錯題？'))return;wrongMap={};refreshBadge();renderWrong()}
function wCount(){return Object.keys(wrongMap).length}
function refreshBadge(){
  const n=wCount(),b=document.getElementById('wBadge');
  b.textContent=n;b.style.display=n?'':'none';
  const bp=document.getElementById('btnWP');if(bp)bp.style.display=n?'':'none';
}
function switchTab(t){
  ['quiz','wrong'].forEach(x=>{
    document.getElementById(x+'Panel').classList.toggle('active',x===t);
    document.getElementById('tab'+x[0].toUpperCase()+x.slice(1)).classList.toggle('active',x===t);
  });
  if(t==='wrong')renderWrong();
}
function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b}
function badgeStyle(s){const m=SEC_META[s]||{};return `background:${m.bg||'#edf2f7'};color:${m.color||'#4a5568'}`}

let quiz=[],idx=0,okC=0,ngC=0,done=false;
function buildQuiz(pool){
  return shuffle(pool).map(q=>{
    const si=shuffle([0,1,2,3]);
    return {...q,so:si.map(i=>q.options[i]),sc:si.indexOf(q.correct)};
  });
}
function startQuiz(){
  const f=document.getElementById('secFilter').value;
  const pool=f==='all'?ALL_Q:ALL_Q.filter(q=>q.section===f);
  quiz=buildQuiz(pool);idx=0;okC=0;ngC=0;done=false;
  switchTab('quiz');updateStats();renderQ();
}
function startWrongQuiz(){
  const pool=Object.values(wrongMap).map(w=>w.q);
  if(!pool.length){alert('目前沒有錯題！');return}
  quiz=buildQuiz(pool);idx=0;okC=0;ngC=0;done=false;
  switchTab('quiz');document.getElementById('secFilter').value='all';
  updateStats();renderQ();
}
function updateStats(){
  const tot=quiz.length,d=okC+ngC;
  document.getElementById('qIdx').textContent=Math.min(idx+1,tot);
  document.getElementById('qTot').textContent=tot;
  document.getElementById('okCnt').textContent=okC;
  document.getElementById('ngCnt').textContent=ngC;
  document.getElementById('acc').textContent=d?Math.round(okC/d*100)+'%':'-';
  document.getElementById('pFill').style.width=(tot?idx/tot*100:0)+'%';
}
function renderQ(){
  const area=document.getElementById('mainArea');
  if(idx>=quiz.length){showResult();return}
  const q=quiz[idx],L=['A','B','C','D'];
  const opts=q.so.map((o,i)=>`
    <button class="obtn" onclick="pick(${i})" id="o${i}">
      <span class="lbl">${L[i]}</span><span class="txt">${o}</span>
    </button>`).join('');
  area.innerHTML=`
    <div class="qcard">
      <div class="qmeta">
        <span class="sbadge" style="${badgeStyle(q.section)}">${q.section}</span>
        <span class="qnum">第 ${idx+1} 題 / 共 ${quiz.length} 題</span>
      </div>
      <div class="stem">${q.stem}</div>
      <div class="options">${opts}</div>
      <div id="fb"></div>
      <div class="nav-row" id="nav" style="display:none">
        <button class="nbtn" onclick="next()">下一題 →</button>
      </div>
    </div>`;
  done=false;updateStats();
}
function pick(i){
  if(done)return;done=true;
  const q=quiz[idx],ok=(i===q.sc),L=['A','B','C','D'];
  for(let j=0;j<4;j++){
    const b=document.getElementById('o'+j);b.disabled=true;
    if(j===i&&ok)b.classList.add('correct');
    else if(j===i&&!ok)b.classList.add('wrong');
    else if(j===q.sc&&!ok)b.classList.add('show-correct');
  }
  const fb=document.getElementById('fb');
  if(ok){okC++;fb.innerHTML=`<div class="feedback ok">✓ 答對了！正確答案是 <strong>${L[q.sc]}. ${q.so[q.sc]}</strong></div>`;}
  else{ngC++;addWrong(q);fb.innerHTML=`<div class="feedback ng">✗ 答錯了！正確答案是 <strong>${L[q.sc]}. ${q.so[q.sc]}</strong></div>`;}
  document.getElementById('nav').style.display='flex';updateStats();
}
function next(){idx++;renderQ()}
function showResult(){
  const tot=quiz.length,pct=Math.round(okC/tot*100);
  const emoji=pct>=80?'🎉':pct>=60?'👍':'📚';
  const msg=pct>=80?'優異！繼續保持':pct>=60?'不錯！再加把勁':'繼續努力加油！';
  const wn=wCount();
  document.getElementById('mainArea').innerHTML=`
    <div class="result-card">
      <h2>${emoji} 測驗完成</h2>
      <div class="score">${pct}%</div>
      <p>答對 <strong>${okC}</strong> 題 / 答錯 <strong>${tot-okC}</strong> 題 / 共 <strong>${tot}</strong> 題</p>
      <p style="margin-top:8px;font-size:1.08rem;font-weight:600">${msg}</p>
      ${wn?`<p style="margin-top:11px;color:#e53e3e;font-size:.87rem">累計錯題：${wn} 題</p>`:''}
      <div class="result-actions">
        <button class="btn-restart" onclick="startQuiz()">🔀 再練一次</button>
        ${wn?`<button class="btn-wq" onclick="startWrongQuiz()">🔁 練習錯題（${wn}題）</button>`:''}
        ${wn?`<button class="btn-vw" onclick="switchTab('wrong')">❌ 查看錯題整理</button>`:''}
      </div>
    </div>`;
  document.getElementById('pFill').style.width='100%';
}
function renderWrong(){
  const area=document.getElementById('wListArea'),stats=document.getElementById('wStats');
  const f=document.getElementById('wFilter').value;
  let entries=Object.values(wrongMap);
  const total=entries.length;
  if(f!=='all')entries=entries.filter(e=>e.q.section===f);
  entries.sort((a,b)=>b.count-a.count);
  stats.innerHTML=`<span>累計錯題：<strong>${total}</strong> 題</span>`
    +(f!=='all'?`<span>本章節：<strong>${entries.length}</strong> 題</span>`:'');
  if(!entries.length){
    area.innerHTML=`<div class="wempty"><div class="icon">${total?'📂':'🎉'}</div>
      <p>${total?'此章節暫無錯題':'還沒有錯題，繼續加油！'}</p></div>`;
    return;
  }
  const L=['A','B','C','D'];
  area.innerHTML=entries.map(e=>{
    const q=e.q;
    const opts=q.options.map((o,i)=>`
      <div class="wopt ${i===q.correct?'isc':''}">
        <span class="wlbl">${L[i]}</span>
        <span>${o}</span>${i===q.correct?' <strong>✓</strong>':''}
      </div>`).join('');
    const esc=JSON.stringify(q.stem);
    return `<div class="witem">
      <div class="witem-meta">
        <span class="sbadge" style="${badgeStyle(q.section)}">${q.section}</span>
        <span class="wtimes">錯 ${e.count} 次</span>
      </div>
      <div class="wstem">${q.stem}</div>
      <div class="wopts">${opts}</div>
      <div class="witem-actions">
        <button class="btn-rm" onclick="removeWrong(${esc})">✓ 已學會，移除</button>
      </div>
    </div>`;
  }).join('');
}
startQuiz();
</script>
</body>
</html>
